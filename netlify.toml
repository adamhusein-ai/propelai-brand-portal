# Netlify Configuration for PropelAI Brand Portal

[build]
  # Build command to create production bundle
  command = "pnpm build"
  # Directory where the build output is located
  publish = "dist"
  # Node version to use
  node_version = "18.17.0"

[build.environment]
  # Environment variables for build
  NODE_ENV = "production"

# Redirect all non-file requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Context-specific settings for production
[context.production]
  command = "pnpm build"
  publish = "dist"

# Context-specific settings for deploy preview
[context.deploy-preview]
  command = "pnpm build"
  publish = "dist"

# Context-specific settings for branch preview
[context.branch-deploy]
  command = "pnpm build"
  publish = "dist"

# Functions configuration (if needed in future)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Plugins (optional)
# [[plugins]]
#   package = "@netlify/plugin-nextjs"
